services:
  - type: web
    name: academai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          type: postgresql
          name: academai-db
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
